<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"/>
    <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
  </head>

  <body>
    <div class="contaier">
      <a
        href="bg-container.jpg"
        class="glightbox"
        data-title="My title"
        data-description="description here"
        data-desc-position="bottom"
        data-type="image"
        data-effect="fade"
        data-width="900px"
        data-height="auto"
        data-zoomable="true"
        data-draggable="true"
      >
        <img src="bg-container.jpg" alt="image" />
      </a>
      <a
        href="Dota.jpg"
        class="glightbox"
        data-title="Dota 2"
        data-description="Dota 2 game image"
        data-desc-position="bottom"
        data-type="image"
        data-effect="fade"
        data-width="900px"
        data-height="auto"
        data-zoomable="true"
        data-draggable="true"
      >
        <img src="Dota.jpg" alt="image" />
      </a>
    </div>


    <script type="text/javascript">
      const lightbox = GLightbox({
        touchNavigation: true,
        loop: true,
        autoplayVideos: true,
      });
    </script>
  </body>
</html>
